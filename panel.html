<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <div id="toolbar">
      <button id="refresh" class="btn" title="Refresh">↻</button>
      <input id="filter" type="search" placeholder="Filter by URL…" />
      <select id="statusFilter" title="Filter by status">
        <option value="all">All</option>
        <option value="2xx">2xx</option>
        <option value="3xx">3xx</option>
        <option value="4xx">4xx</option>
        <option value="5xx">5xx</option>
        <option value="err">Errors</option>
      </select>
      <button id="clear" class="btn" title="Clear the current view">Clear</button>
      <button id="gear" class="btn" title="Settings">⚙</button>
      <span id="summary" class="summary"></span>
    </div>

    <div id="settings" hidden>
      <div class="set-row">
        <label for="elementId">Element id</label>
        <input id="elementId" type="text" spellcheck="false" autocapitalize="off" />
        <button id="saveId" class="btn">Save</button>
        <span class="hint">
          DOM id holding the SSR fetch JSON (default <code>__ssr_data</code>).
        </span>
      </div>
      <div class="set-row">
        <span class="hint">Colors</span>
        <div id="colorGrid" class="color-grid"></div>
        <button id="resetColors" class="btn">Reset</button>
      </div>
    </div>

    <div id="main">
      <div id="list">
        <table id="net" hidden>
          <thead>
            <tr id="head">
              <th data-key="url" class="col-name">Name</th>
              <th data-key="method" class="col-method">Method</th>
              <th data-key="status" class="col-status">Status</th>
              <th data-key="size" class="col-size">Size</th>
              <th data-key="durationMs" class="col-time">Time</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div id="empty"></div>
      </div>

      <div id="divider" hidden></div>

      <div id="detail" hidden>
        <div id="detailTabs">
          <button class="dtab active" data-tab="general">General</button>
          <button class="dtab" data-tab="headers">Headers</button>
          <button class="dtab" data-tab="response">Response</button>
          <button class="dtab" data-tab="timing">Timing</button>
          <button id="detailClose" class="btn" title="Close">✕</button>
        </div>
        <div id="detailBody"></div>
      </div>
    </div>

    <script src="panel.js"></script>
  </body>
</html>
